<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>实时对话监控页面</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --card: #ffffff;
      --card-soft: #f8fbff;
      --border: #dbe4f0;
      --border-strong: #bfd0e6;
      --text: #172033;
      --muted: #677489;
      --accent: #1d4ed8;
      --accent-soft: #dbeafe;
      --caller: #0f766e;
      --callee: #7c3aed;
      --system: #6b7280;
      --log-bg: #0f172a;
      --log-fg: #dbe5f5;
    }

    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(29, 78, 216, 0.12), transparent 34%),
        radial-gradient(circle at top right, rgba(124, 58, 237, 0.09), transparent 30%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 38%, #edf3fb 100%);
      color: var(--text);
    }

    * { box-sizing: border-box; }

    .wrap { max-width: 1360px; margin: 24px auto 28px; padding: 0 16px 24px; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .nav a {
      text-decoration: none;
      color: #1f2937;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 12px;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }

    .nav a.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .hero {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .title-line {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    h2 {
      margin: 0;
      font-size: 30px;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .tip {
      position: relative;
      display: inline-grid;
      place-items: center;
      width: 22px;
      height: 22px;
      border-radius: 999px;
      border: 1px solid #c9d6e6;
      color: #456;
      background: rgba(255, 255, 255, 0.85);
      font-size: 13px;
      font-weight: 700;
      cursor: help;
      flex: 0 0 auto;
      z-index: 20;
    }

    .tip::after {
      content: attr(data-tip);
      position: absolute;
      left: 50%;
      bottom: calc(100% + 10px);
      transform: translateX(-50%);
      min-width: 220px;
      max-width: 320px;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(17, 24, 39, 0.94);
      color: #fff;
      font-size: 12px;
      line-height: 1.5;
      white-space: normal;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease, transform 0.15s ease;
      box-shadow: 0 12px 28px rgba(17, 24, 39, 0.18);
      z-index: 30;
    }

    .tip:hover {
      z-index: 40;
    }

    .tip:hover::after {
      opacity: 1;
      transform: translateX(-50%) translateY(-2px);
    }

    .status-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 14px 0 12px;
    }

    .metric {
      position: relative;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px;
      box-shadow: 0 6px 18px rgba(17, 24, 39, 0.05);
      overflow: visible;
    }

    .metric .k { font-size: 12px; color: var(--muted); }
    .metric .v { font-size: 18px; margin-top: 6px; font-weight: 700; letter-spacing: -0.02em; }

    .grid { display: grid; grid-template-columns: 360px minmax(0, 1fr); gap: 12px; }

    .card {
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 10px 28px rgba(16, 24, 40, 0.05);
      overflow: visible;
    }

    .card-head {
      position: relative;
      z-index: 5;
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    .card-title {
      margin: 0;
      font-size: 17px;
      line-height: 1.2;
    }

    .card-sub {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .card-body { padding: 14px 16px 16px; }

    .toolbar { display: flex; flex-wrap: wrap; gap: 8px; }

    button,
    input {
      font: inherit;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #c9d6e6;
      border-radius: 12px;
      background: #fcfdff;
      color: #111827;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(29, 78, 216, 0.12);
    }

    button {
      padding: 9px 12px;
      border: 1px solid #c9d6e6;
      border-radius: 12px;
      cursor: pointer;
      background: #fff;
      color: #1f2937;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(17, 24, 39, 0.08);
    }

    button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .session-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: auto;
      max-height: 620px;
      padding-right: 2px;
    }

    .session-item {
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      border: 1px solid #e1eaf5;
      border-radius: 14px;
      padding: 12px;
      cursor: pointer;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
    }

    .session-item:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(17, 24, 39, 0.07);
    }

    .session-item.active {
      border-color: rgba(29, 78, 216, 0.45);
      box-shadow: 0 0 0 1px rgba(29, 78, 216, 0.08), 0 8px 20px rgba(29, 78, 216, 0.08);
      background: linear-gradient(180deg, #fafdff 0%, #eef5ff 100%);
    }

    .session-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .session-id { font-size: 14px; font-weight: 700; }
    .session-time { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .session-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .session-snippet {
      margin-top: 8px;
      font-size: 13px;
      line-height: 1.5;
      color: #243043;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .tag {
      font-size: 12px;
      color: #334155;
      background: #eef4ff;
      border: 1px solid #d7e6ff;
      border-radius: 999px;
      padding: 4px 10px;
      white-space: nowrap;
    }

    .tag.caller { background: rgba(15, 118, 110, 0.08); border-color: rgba(15, 118, 110, 0.16); color: var(--caller); }
    .tag.callee { background: rgba(124, 58, 237, 0.08); border-color: rgba(124, 58, 237, 0.16); color: var(--callee); }
    .tag.system { background: rgba(107, 114, 128, 0.08); border-color: rgba(107, 114, 128, 0.16); color: var(--system); }

    .conversation {
      overflow: auto;
      max-height: 620px;
      min-height: 460px;
      background:
        linear-gradient(180deg, rgba(249, 251, 255, 0.96) 0%, rgba(241, 246, 255, 0.96) 100%);
      padding: 14px;
    }

    .conversation-empty {
      height: 100%;
      min-height: 430px;
      display: grid;
      place-items: center;
      color: #8a94a6;
      border: 1px dashed #c9d6e6;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.5);
      text-align: center;
      padding: 20px;
      line-height: 1.6;
    }

    .turn {
      display: flex;
      margin-bottom: 12px;
    }

    .turn.left { justify-content: flex-start; }
    .turn.right { justify-content: flex-end; }
    .turn.center { justify-content: center; }

    .bubble {
      max-width: min(660px, 86%);
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid #dce5f2;
      background: #ffffff;
      box-shadow: 0 6px 16px rgba(17, 24, 39, 0.05);
    }

    .bubble.caller {
      border-color: rgba(15, 118, 110, 0.2);
      background: linear-gradient(180deg, rgba(236, 253, 245, 0.96) 0%, rgba(248, 255, 252, 0.98) 100%);
    }

    .bubble.callee {
      border-color: rgba(124, 58, 237, 0.2);
      background: linear-gradient(180deg, rgba(245, 243, 255, 0.96) 0%, rgba(250, 248, 255, 0.98) 100%);
    }

    .bubble.system {
      border-color: rgba(107, 114, 128, 0.18);
      background: linear-gradient(180deg, rgba(249, 250, 251, 0.96) 0%, rgba(255, 255, 255, 0.98) 100%);
      color: #4b5563;
    }

    .bubble-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .bubble-role {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 700;
      color: var(--text);
    }

    .bubble-text {
      font-size: 15px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .raw-log {
      height: 220px;
      overflow: auto;
      background: var(--log-bg);
      color: var(--log-fg);
      border-radius: 14px;
      padding: 12px;
      border: 1px solid #1d2f4a;
      font-family: Consolas, "SFMono-Regular", monospace;
      font-size: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .hint { font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.5; }

    @media (max-width: 1060px) {
      .grid { grid-template-columns: 1fr; }
      .status-strip { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .session-list, .conversation { max-height: none; }
    }

    @media (max-width: 720px) {
      .hero { flex-direction: column; align-items: start; }
      h2 { font-size: 26px; }
      .status-strip { grid-template-columns: 1fr; }
      .bubble { max-width: 94%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <div class="eyebrow">ASR Monitor</div>
        <div class="title-line">
          <h2>实时对话监控页面</h2>
          <span
            class="tip"
            data-tip="按 callId 聚合会话，左侧看会话列表，右侧看对话详情；主叫问法来自 /monitor-intent，被叫回答来自 /monitor-asr，系统状态来自 /monitor-event。"
          >?</span>
        </div>
      </div>
      <div class="nav">
        <a href="/" class="active">当前监控页</a>
        <a href="/debug" target="_blank" rel="noopener noreferrer">打开调试页</a>
      </div>
    </div>

    <div class="status-strip">
      <div class="metric">
        <div class="k">当前会话数 <span class="tip" data-tip="当前内存中可见的会话总数，按 callId 聚合。">?</span></div>
        <div class="v" id="callCount">0</div>
      </div>
      <div class="metric">
        <div class="k">已选会话 <span class="tip" data-tip="点击左侧任一会话后，这里会显示当前选中的 callId。">?</span></div>
        <div class="v" id="selectedCallId">-</div>
      </div>
      <div class="metric">
        <div class="k">监控状态 <span class="tip" data-tip="页面与后端 /events 的连接状态。">?</span></div>
        <div class="v" id="monitorState">CONNECTING</div>
      </div>
      <div class="metric">
        <div class="k">最近刷新 <span class="tip" data-tip="手动刷新会话列表的时间。">?</span></div>
        <div class="v" id="lastRefresh">-</div>
      </div>
    </div>

    <div class="grid">
      <section class="card">
        <div class="card-head">
          <div>
            <h3 class="card-title">当前对话列表 <span class="tip" data-tip="按 callId 聚合的会话列表，越新的会话排得越靠前。">?</span></h3>
            <p class="card-sub">按 `callId` 聚合，点击一项查看该会话的完整对话流。</p>
          </div>
          <div class="toolbar">
            <button id="clearSelectionBtn">取消选择</button>
            <button id="refreshBtn" class="primary">刷新会话</button>
            <button id="selectLatestBtn">查看最新</button>
          </div>
        </div>
        <div class="card-body">
          <input id="callSearch" placeholder="搜索 callId / uuid / 文本片段" />
          <div id="callList" class="session-list"></div>
        </div>
      </section>

      <section class="card">
        <div class="card-head">
          <div>
            <h3 class="card-title">对话详情 <span class="tip" data-tip="左侧气泡表示主叫问法，右侧气泡表示被叫回答，中间气泡表示系统事件。">?</span></h3>
            <p class="card-sub" id="selectedMeta">选择左侧某个会话后，这里展示左右气泡式对话流。</p>
          </div>
          <div class="toolbar">
            <span id="selectedBadge" class="tag system">未选择</span>
          </div>
        </div>
        <div class="card-body" style="padding: 0;">
          <div id="conversation" class="conversation">
            <div id="conversationEmpty" class="conversation-empty">选择左侧某个 `callId` 查看详情。<br />左侧固定显示主叫问法，右侧固定显示被叫回答。</div>
          </div>
        </div>
      </section>
    </div>

    <section class="card" style="margin-top: 12px;">
      <div class="card-head">
        <div>
          <h3 class="card-title">最近原始事件 <span class="tip" data-tip="仅用于排查监控链路，保留最近收到的原始事件。">?</span></h3>
        </div>
      </div>
      <div class="card-body">
        <div id="rawEventLog" class="raw-log"></div>
      </div>
    </section>
  </div>

  <script src="/app.js"></script>
</body>
</html>
